AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
# Template for the Event Stream Backend used in the demo.
# This SAM template defines a single Lambda-backed API (StreamFunction),
# two S3 buckets (raw events and anomalies), an SNS topic for notifications,
# and a DynamoDB table used for aggregations. Environment variables for the
# Lambda are wired to these resources so the function can write/read them.
Description: Event Stream Backend

Parameters:
  AggTableName:
    Type: String
    Default: event-stream-aggregations
    Description: DynamoDB table to store live aggregations

Resources:

  Api:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET, POST, OPTIONS'"
        AllowHeaders: "'Content-Type, Authorization'"
        AllowOrigin: "'*'"

  StreamFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers
      Handler: stream.handler
      Runtime: nodejs20.x
      Timeout: 90
      MemorySize: 1024
      Environment:
        Variables:
          RAW_BUCKET: !Ref RawBucket
          ANOMALY_BUCKET: !Ref AnomalyBucket
          AGG_TABLE: !Ref AggTableName
          SNS_TOPIC_ARN: !Ref AnomalyTopic
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub arn:aws:s3:::${RawBucket}/*
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub arn:aws:s3:::${AnomalyBucket}/*
            - Effect: Allow
              Action:
                - dynamodb:UpdateItem
                - dynamodb:PutItem
                - dynamodb:Scan
              Resource: !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AggTableName}
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: !Ref AnomalyTopic
      Events:
        StreamApi:
          Type: Api
          Properties:
            Path: /stream
            Method: post
            RestApiId: !Ref Api
        StreamMetrics:
          Type: Api
          Properties:
            Path: /stream
            Method: get
            RestApiId: !Ref Api

  # ✅ S3 buckets with stack-scoped names to avoid conflicts
  RawBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-raw-events-${AWS::AccountId}'

  AnomalyBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-anomalies-${AWS::AccountId}'

  AnomalyTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: event-stream-anomalies
      DisplayName: Event Stream Anomalies

  AnomalyEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AnomalyTopic
      Protocol: email
      Endpoint: evokeriskteam@gmail.com

  AggTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref AggTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/prod"

  RawBucketName:
    Description: Generated S3 bucket for raw events
    Value: !Ref RawBucket

  AnomalyBucketName:
    Description: Generated S3 bucket for anomaly events
    Value: !Ref AnomalyBucket