AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Event Stream Pipeline - Stage 1 Event Generator to Kinesis,
  Stage 2 Aggregator to DynamoDB, Stage 3 Metrics Dashboard API

Parameters:
  StreamShards:
    Type: Number
    Default: 2
    Description: Number of Kinesis stream shards

  AggTableName:
    Type: String
    Default: event-stream-aggregations
    Description: DynamoDB table name for aggregations

Globals:
  Function:
    Runtime: nodejs22.x
    MemorySize: 512
    Timeout: 180

Resources:

  # ========== KINESIS STREAM ==========
  EventStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: event-stream-pipeline
      ShardCount: !Ref StreamShards
      StreamEncryption:
        EncryptionType: KMS
        KeyId: alias/aws/kinesis

  # ========== DYNAMODB TABLE ==========
  AggregationTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref AggTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  # ========== S3 BUCKETS ==========
  # Note: S3 bucket names must be globally unique and have restricted naming
  # TODO: Re-enable after resolving naming constraints
  # Temporary: Use DynamoDB TTL for data archival instead of S3
  # RawEventsS3Bucket:
  #   Type: AWS::S3::Bucket
  #   Properties:
  #     BucketName: !Sub 'event-stream-raw-${AWS::AccountId}-${AWS::Region}'
  #     VersioningConfiguration:
  #       Status: Enabled
  #     PublicAccessBlockConfiguration:
  #       BlockPublicAcls: true
  #       BlockPublicPolicy: true
  #       IgnorePublicAcls: true
  #       RestrictPublicBuckets: true
  #     ServerSideEncryptionConfiguration:
  #       - ServerSideEncryptionByDefault:
  #           SSEAlgorithm: AES256
  #     LifecycleConfiguration:
  #       Rules:
  #         - Id: DeleteOldRawEvents
  #           Status: Enabled
  #           ExpirationInDays: 90
  #           Filter:
  #             Prefix: raw-events/
  #         - Id: TransitionToGlacier
  #           Status: Enabled
  #           Transitions:
  #             - TransitionInDays: 30
  #               StorageClass: INTELLIGENT_TIERING
  #           Filter:
  #             Prefix: raw-events/

  # AggregationsS3Bucket:
  #   Type: AWS::S3::Bucket
  #   Properties:
  #     BucketName: !Sub 'event-stream-agg-${AWS::AccountId}-${AWS::Region}'
  #     VersioningConfiguration:
  #       Status: Enabled
  #     PublicAccessBlockConfiguration:
  #       BlockPublicAcls: true
  #       BlockPublicPolicy: true
  #       IgnorePublicAcls: true
  #       RestrictPublicBuckets: true
  #     ServerSideEncryptionConfiguration:
  #       - ServerSideEncryptionByDefault:
  #           SSEAlgorithm: AES256
  #     LifecycleConfiguration:
  #       Rules:
  #         - Id: TransitionOldAggregations
  #           Status: Enabled
  #           Transitions:
  #             - TransitionInDays: 30
  #               StorageClass: STANDARD_IA
  #             - TransitionInDays: 60
  #               StorageClass: GLACIER
  #           Filter:
  #             Prefix: aggregations/

  # ========== SNS TOPIC ==========
  AnomalyTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: event-stream-anomalies

  # ========== IAM ROLES ==========
  EventGeneratorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: KinesisWritePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                Resource: !GetAtt EventStream.Arn

  AggregatorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaKinesisExecutionRole
      Policies:
        - PolicyName: DynamoDBSNSPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:DeleteItem
                Resource: !GetAtt AggregationTable.Arn
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref AnomalyTopic

  MetricsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBReadPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource: !GetAtt AggregationTable.Arn

  # ========== API GATEWAY ==========
  EventApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Api-Key'"
        AllowOrigin: "'*'"

  # ========== STAGE 1: GENERATOR LAMBDA ==========
  EventGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: event-generator/
      Handler: app/handler.handler
      Runtime: nodejs22.x
      MemorySize: 1024
      Timeout: 900
      Role: !GetAtt EventGeneratorRole.Arn
      Environment:
        Variables:
          STREAM_NAME: !Ref EventStream
      Events:
        GenerateApi:
          Type: Api
          Properties:
            RestApiId: !Ref EventApi
            Path: /generate
            Method: post

  # ========== STAGE 2: AGGREGATOR LAMBDA ==========
  AggregatorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: event-aggregator/
      Handler: src/handlers/stream.handler
      MemorySize: 1024
      Timeout: 60
      Role: !GetAtt AggregatorRole.Arn
      Environment:
        Variables:
          AGG_TABLE: !Ref AggregationTable
          SNS_TOPIC_ARN: !Ref AnomalyTopic
          DEPLOYMENT_ID: "2026-04-15-lambda-fix"
      Events:
        KinesisStream:
          Type: Kinesis
          Properties:
            Stream: !GetAtt EventStream.Arn
            StartingPosition: LATEST
            BatchSize: 500
            MaximumBatchingWindowInSeconds: 1
            ParallelizationFactor: 10
            MaximumRetryAttempts: 2
            DestinationConfig:
              OnFailure:
                Type: SNS
                Destination: !Ref AnomalyTopic

  # ========== STAGE 3: METRICS LAMBDA ==========
  MetricsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: event-aggregator/
      Handler: src/handlers/metrics.handler
      MemorySize: 512
      Timeout: 10
      EphemeralStorage:
        Size: 1024
      Role: !GetAtt MetricsRole.Arn
      Environment:
        Variables:
          AGG_TABLE: !Ref AggregationTable
      Events:
        MetricsApi:
          Type: Api
          Properties:
            RestApiId: !Ref EventApi
            Path: /stream
            Method: get

  # ========== CLOUDWATCH LOG GROUPS ==========
  GeneratorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${EventGeneratorFunction}'
      RetentionInDays: 7

  AggregatorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AggregatorFunction}'
      RetentionInDays: 7

  MetricsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${MetricsFunction}'
      RetentionInDays: 7

Outputs:
  GeneratorApiEndpoint:
    Description: Event Generator API endpoint
    Value: !Sub 'https://${EventApi}.execute-api.${AWS::Region}.amazonaws.com/prod/generate'
    Export:
      Name: !Sub '${AWS::StackName}-GeneratorApi'

  MetricsApiEndpoint:
    Description: Dashboard Metrics API endpoint
    Value: !Sub 'https://${EventApi}.execute-api.${AWS::Region}.amazonaws.com/prod/stream'
    Export:
      Name: !Sub '${AWS::StackName}-MetricsApi'

  EventApiEndpoint:
    Description: Full API Gateway base URL
    Value: !Sub 'https://${EventApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
    Export:
      Name: !Sub '${AWS::StackName}-ApiBase'

  EventStreamName:
    Description: Kinesis stream name
    Value: !Ref EventStream
    Export:
      Name: !Sub '${AWS::StackName}-StreamName'

  EventStreamArn:
    Description: Kinesis stream ARN
    Value: !GetAtt EventStream.Arn
    Export:
      Name: !Sub '${AWS::StackName}-StreamArn'

  AggregationTableName:
    Description: DynamoDB table name
    Value: !Ref AggregationTable
    Export:
      Name: !Sub '${AWS::StackName}-AggTable'

  AnomalyTopicArn:
    Description: SNS topic ARN
    Value: !Ref AnomalyTopic
    Export:
      Name: !Sub '${AWS::StackName}-AnomalyTopic'

  GeneratorFunctionArn:
    Description: Event Generator Lambda ARN
    Value: !GetAtt EventGeneratorFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-GeneratorArn'

  AggregatorFunctionArn:
    Description: Event Aggregator Lambda ARN
    Value: !GetAtt AggregatorFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-AggregatorArn'

  # RawEventsBucketName:
  #   Description: S3 bucket for raw event data (Parquet format)
  #   Value: !Ref RawEventsS3Bucket
  #   Export:
  #     Name: !Sub '${AWS::StackName}-RawBucket'

  # AggregationsBucketName:
  #   Description: S3 bucket for aggregated data (Parquet format)
  #   Value: !Ref AggregationsS3Bucket
  #   Export:
  #     Name: !Sub '${AWS::StackName}-AggBucket'

  MetricsFunctionArn:
    Description: Metrics Lambda ARN
    Value: !GetAtt MetricsFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-MetricsArn'
